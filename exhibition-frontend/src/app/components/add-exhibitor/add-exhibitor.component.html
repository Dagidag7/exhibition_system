<h2 mat-dialog-title>Add Exhibitor</h2>
<form #exhibitorForm="ngForm" (ngSubmit)="onSubmit()">
  <mat-form-field appearance="fill" class="full-width">
    <mat-label>Name</mat-label>
    <input matInput name="name" [(ngModel)]="exhibitor.name" required>
  </mat-form-field>
  
  <mat-form-field appearance="fill" class="full-width">
    <mat-label>Contact Person</mat-label>
    <input matInput name="contactPerson" [(ngModel)]="exhibitor.contactPerson" required>
  </mat-form-field>
  
  <mat-form-field appearance="fill" class="full-width">
    <mat-label>Email</mat-label>
    <input matInput name="email" [(ngModel)]="exhibitor.email" required type="email">
  </mat-form-field>
  
  <mat-form-field appearance="fill" class="full-width">
    <mat-label>Booth Number</mat-label>
    <input matInput name="boothNumber" [(ngModel)]="exhibitor.boothNumber" required>
  </mat-form-field>
  
  <mat-form-field appearance="fill" class="full-width">
    <mat-label>Floor Number</mat-label>
    <input matInput name="floorNumber" [(ngModel)]="exhibitor.floorNumber" required>
  </mat-form-field>
  
  <mat-form-field appearance="fill" class="full-width">
    <mat-label>Logo URL</mat-label>
    <input matInput name="logoUrl" [(ngModel)]="exhibitor.logoUrl">
  </mat-form-field>
  
  <div style="margin-top: 16px; text-align: right;">
    <button mat-button type="button" (click)="onCancel()">Cancel</button>
    <button mat-raised-button color="primary" type="submit" [disabled]="!exhibitorForm.form.valid">Add</button>
  </div>
</form>
