<div class="login-container">
  <div class="login-background">
    <div class="animated-bg"></div>
    <div class="floating-shapes">
      <div class="shape shape-1"></div>
      <div class="shape shape-2"></div>
      <div class="shape shape-3"></div>
    </div>
  </div>
  
  <div class="login-content">
    <div class="login-card">
      <div class="login-header">
        <div class="logo-container">
          <div class="logo-icon">
            <mat-icon>event</mat-icon>
          </div>
        </div>
        <h1 class="welcome-text">Welcome Back</h1>
        <p class="subtitle">Sign in to your Exhibition Account</p>
      </div>
      
      <div class="login-form">
        <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
          <div class="form-field">
            <div class="input-container">
              <mat-icon class="input-icon">email</mat-icon>
              <input 
                matInput 
                type="email" 
                [(ngModel)]="loginData.email" 
                name="email"
                placeholder="Email*"
                required
                autocomplete="email"
                class="form-input">
            </div>
          </div>

          <div class="form-field">
            <div class="input-container">
              <mat-icon class="input-icon">lock</mat-icon>
              <input 
                matInput 
                [type]="hidePassword ? 'password' : 'text'"
                [(ngModel)]="loginData.password" 
                name="password"
                placeholder="Password*"
                required
                autocomplete="current-password"
                class="form-input">
              <button 
                mat-icon-button 
                (click)="togglePasswordVisibility()" 
                type="button"
                class="password-toggle"
                [attr.aria-label]="'Hide password'" 
                [attr.aria-pressed]="hidePassword">
                <mat-icon>{{hidePassword ? 'visibility_off' : 'visibility'}}</mat-icon>
              </button>
            </div>
          </div>

          <div class="form-actions">
            <button 
              mat-raised-button 
              type="submit"
              [disabled]="isSubmitting || !loginForm.form.valid"
              class="login-btn">
              <mat-icon *ngIf="isSubmitting" class="spinning">hourglass_empty</mat-icon>
              <span>{{ isSubmitting ? 'Signing In...' : 'Sign In' }}</span>
            </button>
          </div>
        </form>
      </div>
      
      <div class="login-footer">
        <div class="footer-links">
          <p class="register-link">Don't have an account? <a routerLink="/register">Register here</a></p>
          <p class="forgot-link"><a routerLink="/forgot-password">Forgot your password?</a></p>
        </div>
      </div>
    </div>
  </div>
</div>
